<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="#fbbf24" stroke-width="12" />
  
  <!-- Snail Body -->
  <path d="M120 380 C 120 380, 160 410, 240 410 C 320 410, 390 380, 420 380 C 440 380, 460 395, 450 410 C 430 430, 380 440, 280 440 C 180 440, 110 430, 80 410 C 70 400, 90 380, 120 380 Z" fill="#38bdf8" />
  
  <!-- Snail Head & Eye Stalks -->
  <path d="M120 380 C 100 370, 90 330, 110 270 C 115 250, 125 240, 130 240 C 140 240, 145 260, 140 290 C 135 320, 140 360, 160 380 Z" fill="#38bdf8" />
  <!-- Left Eye Stalk -->
  <path d="M110 270 C 100 250, 80 200, 90 170 C 92 165, 102 165, 105 170 C 110 190, 120 240, 120 260 Z" fill="#38bdf8" />
  <!-- Right Eye Stalk -->
  <path d="M125 265 C 125 245, 135 185, 150 165 C 153 160, 163 160, 165 165 C 168 185, 140 245, 135 265 Z" fill="#38bdf8" />
  
  <!-- Eyes -->
  <circle cx="95" cy="165" r="14" fill="#ffffff" />
  <circle cx="95" cy="165" r="7" fill="#0f172a" />
  <circle cx="158" cy="160" r="14" fill="#ffffff" />
  <circle cx="158" cy="160" r="7" fill="#0f172a" />
  
  <!-- Snail Shell (Golden Spiral) -->
  <circle cx="280" cy="310" r="110" fill="#fbbf24" stroke="#d97706" stroke-width="10" />
  <path d="M280 200 A 110 110 0 1 0 390 310 C 390 270, 350 240, 300 260 C 260 275, 250 320, 280 340 C 300 350, 320 330, 310 310" fill="none" stroke="#d97706" stroke-width="12" stroke-linecap="round" />
  
  <!-- Telephone Receiver on Shell (Den Den Mushi characteristic) -->
  <path d="M230 180 C 250 160, 310 160, 330 180 L 345 170 C 320 140, 240 140, 215 170 Z" fill="#ef4444" />
  <rect x="215" y="165" width="20" height="25" rx="5" fill="#ef4444" transform="rotate(-20 225 177)" />
  <rect x="325" y="165" width="20" height="25" rx="5" fill="#ef4444" transform="rotate(20 335 177)" />
  
  <!-- Antenna / Dial on Shell -->
  <circle cx="280" cy="310" r="25" fill="#e2e8f0" stroke="#94a3b8" stroke-width="4" />
  <line x1="280" y1="310" x2="295" y2="295" stroke="#ef4444" stroke-width="6" stroke-linecap="round" />
</svg>